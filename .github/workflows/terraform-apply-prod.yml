name: terraform-apply-prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY to continue'
        required: true
        default: 'NO'

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate manual confirmation
        run: test "${{ github.event.inputs.confirm }}" = "APPLY"

  apply-prod:
    needs: guard
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: prod
      working_directory: live/prod/app
      aws_region: ap-northeast-2
      aws_role_arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/GitHubActionsTerraformProdRole
      action: apply
