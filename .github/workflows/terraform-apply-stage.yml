name: terraform-apply-stage

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

jobs:
  apply-stage:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: stage
      working_directory: live/stage/app
      aws_region: ap-northeast-2
      aws_role_arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/GitHubActionsTerraformStageRole
      action: apply
