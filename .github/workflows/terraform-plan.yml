name: terraform-plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'live/**'
      - 'modules/**'
      - '.github/workflows/**'

jobs:
  plan-dev:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: dev
      working_directory: live/dev/app
      aws_region: ap-northeast-2
      aws_role_arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/GitHubActionsTerraformDevRole
      action: plan

  plan-stage:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: stage
      working_directory: live/stage/app
      aws_region: ap-northeast-2
      aws_role_arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/GitHubActionsTerraformStageRole
      action: plan

  plan-prod:
    uses: ./.github/workflows/_terraform-reusable.yml
    with:
      environment: prod
      working_directory: live/prod/app
      aws_region: ap-northeast-2
      aws_role_arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/GitHubActionsTerraformProdRole
      action: plan
